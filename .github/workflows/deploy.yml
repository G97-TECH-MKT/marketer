name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "infraestructure/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, prod]

permissions:
  id-token: write   # Required for OIDC token generation
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: marketer

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          # Offline tests only — no real API keys needed
          GEMINI_API_KEY: "test-key"
          INBOUND_TOKEN: "test-token"
          ORCH_CALLBACK_API_KEY: "test-key"

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Limit session to 1 hour for security
          role-session-name: marketer-deploy-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag and URI
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TAG="sha-${SHA}"
          ECR_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${ECR_URI}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${ECR_URI}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --cache-from "${{ steps.meta.outputs.registry }}:latest" \
            --tag "${{ steps.meta.outputs.uri }}" \
            --tag "${{ steps.meta.outputs.registry }}:latest" \
            .

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.uri }}"
          docker push "${{ steps.meta.outputs.registry }}:latest"

  deploy:
    name: Deploy to ECS (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'prod' }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: marketer-deploy-${{ github.run_id }}

      - name: Set environment variables
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          echo "env=${ENV}" >> "$GITHUB_OUTPUT"
          echo "cluster=marketer-${ENV}" >> "$GITHUB_OUTPUT"
          echo "service=marketer" >> "$GITHUB_OUTPUT"

      - name: Render new task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: marketer-${{ steps.env.outputs.env }}
          container-name: marketer
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ steps.env.outputs.service }}
          cluster: ${{ steps.env.outputs.cluster }}
          wait-for-service-stability: true

      - name: Verify deployment
        run: |
          aws ecs describe-services \
            --cluster "${{ steps.env.outputs.cluster }}" \
            --services "${{ steps.env.outputs.service }}" \
            --query 'services[0].{status:status,running:runningCount,desired:desiredCount,deployments:deployments[*].{status:status,running:runningCount}}' \
            --output json
