name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/environments/**"
      - "terraform/modules/**"
  pull_request:
    paths:
      - "terraform/environments/**"
      - "terraform/modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply]

permissions:
  id-token: write
  contents: read
  pull-requests: write   # To post plan output as PR comment

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan' || 'plan') }} — ${{ github.event.inputs.environment || 'prod' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: marketer-terraform-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -no-color
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var="image_tag=${{ github.sha }}" \
            -out=tfplan
        env:
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_inbound_token: ${{ secrets.INBOUND_TOKEN }}
          TF_VAR_orch_callback_api_key: ${{ secrets.ORCH_CALLBACK_API_KEY }}

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            #### Validate ✅ \`${{ steps.validate.outcome }}\`
            #### Format 🖌 \`${{ steps.fmt.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        # Apply only on push to main or explicit workflow_dispatch with action=apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_inbound_token: ${{ secrets.INBOUND_TOKEN }}
          TF_VAR_orch_callback_api_key: ${{ secrets.ORCH_CALLBACK_API_KEY }}
